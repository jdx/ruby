name: Build

on:
  workflow_dispatch:
    inputs:
      formula:
        required: true
        type: string
  workflow_call:
    inputs:
      formula:
        required: true
        type: string

permissions:
  contents: read

env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_NO_AUTO_UPDATE: 1

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-14
            yjit: true
          - runner: ubuntu-22.04
            yjit: true
          - runner: ubuntu-22.04
            yjit: false
          - runner: ubuntu-22.04-arm
            yjit: true
          - runner: ubuntu-22.04-arm
            yjit: false
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # main

      - name: Get version for setup-ruby
        run: |
          SETUP_RUBY_VERSION=${{ inputs.formula }}
          SETUP_RUBY_VERSION=${SETUP_RUBY_VERSION//jdx-ruby}
          SETUP_RUBY_VERSION=${SETUP_RUBY_VERSION//@}
          if [[ "$SETUP_RUBY_VERSION" == "3.2."* ]]; then
            echo SETUP_RUBY_VERSION=${SETUP_RUBY_VERSION} >> $GITHUB_ENV
          fi

      # Static gem extensions typically require the same Ruby version available already
      - uses: ruby/setup-ruby@v1
        id: setup-ruby
        if: ${{ env.SETUP_RUBY_VERSION != '' }}
        with:
          ruby-version: ${{ env.SETUP_RUBY_VERSION }}

      - name: Install Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH
          echo "/home/linuxbrew/.linuxbrew/sbin" >> $GITHUB_PATH
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"

      - name: Tap repo
        run: bin/setup

      - name: Fix Bundler permissions (ARM Linux)
        if: runner.os == 'Linux' && runner.arch == 'ARM64'
        run: chmod -R go-w /home/linuxbrew/.linuxbrew/Homebrew/Library/Homebrew/vendor/bundle || true

      - name: Build jdx Ruby
        run: |
          if [[ -n "${{ steps.setup-ruby.outputs.ruby-prefix }}" ]]; then
            export HOMEBREW_BASERUBY="${{ steps.setup-ruby.outputs.ruby-prefix }}/bin/ruby"
          fi
          YJIT_FLAG=""
          if [[ "${{ matrix.yjit }}" == "false" ]]; then
            YJIT_FLAG="--without-yjit"
          fi
          mkdir -p rubies/
          cd rubies
          brew jdx-package --verbose $YJIT_FLAG ${{ inputs.formula }}

      - name: Upload jdx Ruby
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.formula }}_${{ matrix.runner }}_yjit-${{ matrix.yjit }}
          path: ${{ github.workspace }}/rubies

      - name: Test Portable Ruby
        run: |
          mkdir -p jdx-ruby/
          tar --strip-components 1 -C jdx-ruby -xf rubies/*.tar.gz
          export PATH="${PWD}/jdx-ruby/bin:${PATH}"
          if [[ "${{ matrix.yjit }}" == "true" ]]; then
            ruby --version --yjit
          else
            ruby --version
          fi
          ruby -r debug -r bigdecimal -r json -r yaml -r reline -e "true"
