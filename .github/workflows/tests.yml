name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: "${{ github.ref }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22 # main
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
      - name: Validate recipes
        run: bin/validate-recipes
      - name: Check Ruby syntax
        run: |
          ruby -c libexec/package.rb
          ruby -c libexec/validate_recipes.rb
          ruby -c libexec/update_ruby_recipe.rb

  build:
    needs: syntax
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/build.yml
    with:
      version: 3.4.1

  final:
    needs:
      - syntax
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 1
    if: always()
    steps:
      - name: Check CI job results
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
